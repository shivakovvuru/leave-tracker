<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#faf5ff"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <rect width="600" height="360" fill="url(#bg)"/>
  <g transform="translate(40,40)">
    <rect width="170" height="120" rx="14" fill="url(#card1)"/>
    <text x="20" y="35" fill="white" font-family="Inter, sans-serif" font-size="14" font-weight="600">Projects</text>
    <text x="20" y="80" fill="white" font-family="Inter, sans-serif" font-size="36" font-weight="800">12</text>
    <text x="20" y="100" fill="white" opacity="0.85" font-family="Inter, sans-serif" font-size="11">active engagements</text>
  </g>
  <g transform="translate(225,40)">
    <rect width="170" height="120" rx="14" fill="url(#card2)"/>
    <text x="20" y="35" fill="white" font-family="Inter, sans-serif" font-size="14" font-weight="600">Members</text>
    <text x="20" y="80" fill="white" font-family="Inter, sans-serif" font-size="36" font-weight="800">48</text>
    <text x="20" y="100" fill="white" opacity="0.85" font-family="Inter, sans-serif" font-size="11">across all projects</text>
  </g>
  <g transform="translate(410,40)">
    <rect width="150" height="120" rx="14" fill="url(#card3)"/>
    <text x="20" y="35" fill="white" font-family="Inter, sans-serif" font-size="14" font-weight="600">On Leave</text>
    <text x="20" y="80" fill="white" font-family="Inter, sans-serif" font-size="36" font-weight="800">7</text>
    <text x="20" y="100" fill="white" opacity="0.85" font-family="Inter, sans-serif" font-size="11">today</text>
  </g>

  <g transform="translate(40,180)">
    <rect width="520" height="140" rx="14" fill="white" stroke="#e5e7eb"/>
    <text x="20" y="30" fill="#111827" font-family="Inter, sans-serif" font-size="14" font-weight="700">Weekly Snapshot</text>
    <g transform="translate(20,55)">
      <rect x="0"   y="40" width="50" height="30" rx="6" fill="#c7d2fe"/>
      <rect x="65"  y="20" width="50" height="50" rx="6" fill="#a5b4fc"/>
      <rect x="130" y="10" width="50" height="60" rx="6" fill="#6366f1"/>
      <rect x="195" y="0"  width="50" height="70" rx="6" fill="#4f46e5"/>
      <rect x="260" y="15" width="50" height="55" rx="6" fill="#818cf8"/>
      <rect x="325" y="30" width="50" height="40" rx="6" fill="#c7d2fe"/>
      <rect x="390" y="50" width="50" height="20" rx="6" fill="#e0e7ff"/>
    </g>
  </g>
</svg>
