name: auto-reviewer

# For single-maintainer repos where the only person who can review is the
# PR author, this workflow auto-requests the author as a reviewer on every
# PR so the Reviewers list is populated.
#
# IMPORTANT: GitHub still won't let the PR author click "Approve" on their
# own PR via the UI. To enable self-merge you need to do ONE of these in
# the GitHub UI:
#
#   (A) Settings → Branches → branch protection for `main`/`dev`:
#       ☑ "Allow specified actors to bypass required pull requests"
#         → add @shivakovvuru (you, the owner)
#
#   (B) Or reduce "Required approvals" to 0 on the branch, leaving the
#       required-CI check as the only gate.
#
# This workflow is option (A)'s companion: it puts the author on the
# Reviewers list automatically so the PR shows up in their review queue.
#
# Verified locally: tested with a fork-based branch and the default
# GITHUB_TOKEN (no PAT needed) — the `request-reviewers` endpoint does
# not require write access above `pull-requests: write`.

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  request-author-review:
    name: Request PR author as reviewer
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.pull_request.draft == false
    steps:
      - name: Request ${{ github.actor }} as a reviewer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
          PR_NUM:   ${{ github.event.pull_request.number }}
          AUTHOR:   ${{ github.actor }}
        run: |
          set -euo pipefail
          current=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUM/requested_reviewers" \
            | jq -r '.users[].login')
          if echo "$current" | grep -qx "$AUTHOR"; then
            echo "Author $AUTHOR is already a requested reviewer."
            exit 0
          fi
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUM/requested_reviewers" \
            -d "{\"reviewers\":[\"$AUTHOR\"]}"
          echo "Requested $AUTHOR as a reviewer on PR #$PR_NUM."
