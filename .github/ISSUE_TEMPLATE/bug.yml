name: Bug report
description: Something isn't working as documented.
labels: ['bug']
body:
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical — app is unusable
        - High — major feature broken
        - Medium — feature works but with incorrect output
        - Low — cosmetic / minor
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Sign in as …
        2. Navigate to …
        3. Click …
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: e.g. Windows 11, Chrome 124, Node 20.10, deployed via Docker
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
    validations:
      required: false
