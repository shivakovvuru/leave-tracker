# Example nginx config — place at /etc/nginx/sites-available/leave-tracker
# and symlink to sites-enabled. Then:
#   sudo certbot --nginx -d leave.example.com
#   sudo nginx -t && sudo systemctl reload nginx

# HTTP -> HTTPS redirect (optional)
server {
    listen 80;
    listen [::]:80;
    server_name leave.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name leave.example.com;

    # cert paths — filled in by certbot
    ssl_certificate     /etc/letsencrypt/live/leave.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/leave.example.com/privkey.pem;

    # Sensible defaults
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Reasonable upload limit for any future attachment support
    client_max_body_size 10m;

    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 90s;
    }
}
